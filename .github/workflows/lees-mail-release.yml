name: Lee's Mail Windows Release

on:
  push:
    tags: ["lees-mail-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Lee's Mail private source tag (for example v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: lees-mail-release-${{ github.ref }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-lees-mail:
    runs-on: windows-2025
    permissions:
      contents: write
    env:
      SOURCE_REPO: lyq2010/lees-mail
    outputs:
      source_tag: ${{ steps.tags.outputs.source_tag }}
      public_tag: ${{ steps.tags.outputs.public_tag }}
      version: ${{ steps.tags.outputs.version }}
    steps:
      - name: Resolve and validate tags
        id: tags
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $sourceTag = '${{ inputs.tag }}'
            $publicTag = "lees-mail-$sourceTag"
          } else {
            $publicTag = '${{ github.ref_name }}'
            $sourceTag = $publicTag -replace '^lees-mail-', ''
          }
          if ($sourceTag -notmatch '^v\d+\.\d+\.\d+(\.\d+)?$') { throw "Invalid source tag: $sourceTag" }
          if ($publicTag -ne "lees-mail-$sourceTag") { throw "Invalid public tag: $publicTag" }
          $version = $sourceTag.Substring(1)
          $packageVersion = if ($version.Split('.').Length -eq 3) { "$version.0" } else { $version }
          "source_tag=$sourceTag" >> $env:GITHUB_OUTPUT
          "public_tag=$publicTag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Checkout public release tooling
        uses: actions/checkout@v7
        with:
          path: release-repo
          persist-credentials: false

      - name: Create private source read token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: lees-mail
          permission-contents: read

      - name: Checkout Lee's Mail source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ steps.tags.outputs.source_tag }}
          path: source
          token: ${{ steps.source-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.302

      - name: Restore NuGet package cache
        id: nuget-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('source/**/*.csproj', 'source/Directory.Packages.props', 'source/NuGet.Config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        shell: pwsh
        run: npm install --global pnpm@11.9.0

      - name: Validate Lee's Mail release secrets
        shell: pwsh
        env:
          OUTLOOK_CLIENT_ID: ${{ secrets.LEESMAIL_OUTLOOK_CLIENT_ID }}
          GMAIL_CLIENT_ID: ${{ secrets.LEESMAIL_GMAIL_CLIENT_ID }}
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          SIGNING_PFX_BASE64: ${{ secrets.LEESMAIL_SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.LEESMAIL_SIGNING_PFX_PASSWORD }}
        run: |
          if ($env:OUTLOOK_CLIENT_ID -notmatch '^[0-9a-fA-F-]{36}$') { throw 'LEESMAIL_OUTLOOK_CLIENT_ID is missing or malformed' }
          if ($env:GMAIL_CLIENT_ID -notmatch '^[0-9]+-[a-zA-Z0-9_-]+\.apps\.googleusercontent\.com$') { throw 'LEESMAIL_GMAIL_CLIENT_ID is missing or malformed' }
          $cosBase = $env:COS_PUBLIC_BASE_URL.Trim().TrimEnd('/')
          if (!$cosBase.Contains('://')) { $cosBase = "https://$cosBase" }
          $cosUri = $null
          if (![Uri]::TryCreate($cosBase, [UriKind]::Absolute, [ref]$cosUri) -or $cosUri.Scheme -ne 'https') { throw 'COS_PUBLIC_BASE_URL is missing or malformed' }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64)) { throw 'LEESMAIL_SIGNING_PFX_BASE64 is missing' }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_PASSWORD)) { throw 'LEESMAIL_SIGNING_PFX_PASSWORD is missing' }

      - name: Import Lee's Mail signing certificate
        id: certificate
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.LEESMAIL_SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.LEESMAIL_SIGNING_PFX_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'lees-mail-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          $securePassword = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -Password $securePassword -CertStoreLocation Cert:\CurrentUser\My -Exportable
          if (!$certificate.HasPrivateKey) { throw "Imported Lee's Mail certificate has no private key" }
          if ($certificate.Subject -ne 'CN=Lee') { throw "Unexpected certificate subject: $($certificate.Subject)" }
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
          "pfx_path=$pfxPath" >> $env:GITHUB_OUTPUT

      - name: Create private build configuration
        working-directory: source
        shell: pwsh
        env:
          OUTLOOK_CLIENT_ID: ${{ secrets.LEESMAIL_OUTLOOK_CLIENT_ID }}
          GMAIL_CLIENT_ID: ${{ secrets.LEESMAIL_GMAIL_CLIENT_ID }}
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          $cosBase = $env:COS_PUBLIC_BASE_URL.Trim().TrimEnd('/')
          if (!$cosBase.Contains('://')) { $cosBase = "https://$cosBase" }
          $cosManifest = "$cosBase/latest-lees-mail.json"
          $content = @"
          <Project>
            <PropertyGroup>
              <LeesMailOutlookClientId>$env:OUTLOOK_CLIENT_ID</LeesMailOutlookClientId>
              <LeesMailGmailClientId>$env:GMAIL_CLIENT_ID</LeesMailGmailClientId>
              <LeesMailCosUpdateManifestUrl>$cosManifest</LeesMailCosUpdateManifestUrl>
              <PackageCertificateThumbprint>$env:CERTIFICATE_THUMBPRINT</PackageCertificateThumbprint>
            </PropertyGroup>
          </Project>
          "@
          [IO.File]::WriteAllText('LeesMail.Private.props', $content, [Text.UTF8Encoding]::new($false))

      - name: Verify source version
        working-directory: source
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.tags.outputs.package_version }}
        run: |
          [xml]$manifest = Get-Content -Raw -Encoding UTF8 LeesMail.Mail.WinUI/Package.appxmanifest
          $actual = [string]$manifest.Package.Identity.Version
          if ($actual -ne $env:PACKAGE_VERSION) { throw "Source package version mismatch: $actual != $env:PACKAGE_VERSION" }

      - name: Restore .NET projects serially
        working-directory: source
        shell: pwsh
        env:
          DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: "1"
          MSBUILDDISABLENODEREUSE: "1"
        run: |
          function Invoke-RestoreWithRetry([string]$Project, [string[]]$ExtraArgs = @()) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Write-Host "Restoring $Project (attempt $attempt of 3)"
              & dotnet restore $Project --disable-parallel -m:1 -nr:false -p:BuildInParallel=false -p:UseSharedCompilation=false -p:Platform=x64 @ExtraArgs
              if ($LASTEXITCODE -eq 0) { return }
              if ($attempt -lt 3) { Start-Sleep -Seconds (15 * $attempt) }
            }
            throw "Restore failed after 3 attempts: $Project"
          }

          Invoke-RestoreWithRetry 'LeesMail.Core.Tests/LeesMail.Core.Tests.csproj'
          Invoke-RestoreWithRetry 'LeesMail.Mail.ViewModels.Tests/LeesMail.Mail.ViewModels.Tests.csproj'
          Invoke-RestoreWithRetry 'LeesMail.Mail.WinUI/LeesMail.Mail.WinUI.csproj' @('-p:RuntimeIdentifier=win-x64')

      - name: Save NuGet package cache
        if: steps.nuget-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('source/**/*.csproj', 'source/Directory.Packages.props', 'source/NuGet.Config') }}

      - name: Test Lee's Mail core
        working-directory: source
        shell: pwsh
        env:
          DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: "1"
          MSBUILDDISABLENODEREUSE: "1"
        run: dotnet test LeesMail.Core.Tests/LeesMail.Core.Tests.csproj -c Release --no-restore -m:1 -nr:false -p:BuildInParallel=false -p:UseSharedCompilation=false -p:Platform=x64 --logger "console;verbosity=minimal"

      - name: Test Lee's Mail view models
        working-directory: source
        shell: pwsh
        env:
          DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: "1"
          MSBUILDDISABLENODEREUSE: "1"
        run: dotnet test LeesMail.Mail.ViewModels.Tests/LeesMail.Mail.ViewModels.Tests.csproj -c Release --no-restore -m:1 -nr:false -p:BuildInParallel=false -p:UseSharedCompilation=false -p:Platform=x64 --logger "console;verbosity=minimal"

      - name: Audit XAML automation IDs
        working-directory: source
        shell: pwsh
        run: ./scripts/audit-xaml-automationids.ps1

      - name: Test Cloudflare tracking worker
        working-directory: source/tracking-worker
        shell: pwsh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run check

      - name: Build signed Lee's Mail MSIX
        working-directory: source
        shell: pwsh
        run: ./scripts/build-private-msix.ps1 -NoRestore -AllowUntrustedForVerification -OutputDirectory artifacts/msix

      - name: Verify COS-first update channel is embedded
        working-directory: source
        shell: pwsh
        env:
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
        run: |
          $cosBase = $env:COS_PUBLIC_BASE_URL.Trim().TrimEnd('/')
          if (!$cosBase.Contains('://')) { $cosBase = "https://$cosBase" }
          $expectedManifest = "$cosBase/latest-lees-mail.json"
          $assemblyInfo = @(Get-ChildItem LeesMail.Mail.WinUI/obj/x64/Release -Recurse -File -Filter '*AssemblyInfo.cs')
          if ($assemblyInfo.Count -ne 1) { throw "Expected one generated AssemblyInfo.cs, found $($assemblyInfo.Count)" }
          $generatedSource = Get-Content -LiteralPath $assemblyInfo[0].FullName -Raw -Encoding UTF8
          if (!$generatedSource.Contains($expectedManifest, [StringComparison]::Ordinal)) {
            throw 'Signed build does not contain the configured COS update manifest URL'
          }

      - name: Build and verify Lee's Mail setup
        working-directory: source
        shell: pwsh
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          PACKAGE_VERSION: ${{ steps.tags.outputs.package_version }}
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          $package = @(Get-ChildItem -LiteralPath artifacts/msix -Recurse -File -Filter *.msix)
          if ($package.Count -ne 1) { throw "Expected exactly one MSIX, found $($package.Count)" }

          $inputDirectory = [IO.Path]::GetFullPath('artifacts/installer-input')
          $outputDirectory = [IO.Path]::GetFullPath('artifacts/installer')
          New-Item -ItemType Directory -Force $inputDirectory, $outputDirectory | Out-Null
          Copy-Item -LiteralPath $package[0].FullName -Destination "$inputDirectory/LeesMail.msix" -Force
          Export-Certificate -Cert "Cert:\CurrentUser\My\$env:CERTIFICATE_THUMBPRINT" -FilePath "$inputDirectory/LeesMail_CN-Lee.cer" -Force | Out-Null
          Copy-Item -LiteralPath ../release-repo/release-tools/lees-mail-installer/InstallLeesMail.ps1 -Destination "$inputDirectory/InstallLeesMail.ps1" -Force
          $languageFile = "$inputDirectory/ChineseSimplified.isl"
          $languageUrl = 'https://raw.githubusercontent.com/jrsoftware/issrc/7fc483339b6f5b531eb4c0c504a8026877c9142f/Files/Languages/ChineseSimplified.isl'
          Invoke-WebRequest -Uri $languageUrl -OutFile $languageFile
          $languageHash = (Get-FileHash -LiteralPath $languageFile -Algorithm SHA256).Hash
          if ($languageHash -ne '6753BE2C5E2740D859900FD902824DB2EC568DA5C5B52486524C9762D778B0B0') {
            throw "Inno Setup Chinese language file hash mismatch: $languageHash"
          }

          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $definition = [IO.Path]::GetFullPath('../release-repo/release-tools/lees-mail-installer/LeesMailInstaller.iss')
          if (!(Test-Path -LiteralPath $compiler -PathType Leaf)) { throw 'Inno Setup compiler is missing from the runner' }
          & $compiler "/DAppVersion=$env:VERSION" "/DSourcePath=$inputDirectory" "/DOutputPath=$outputDirectory" $definition
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }

          $setup = @(Get-ChildItem -LiteralPath $outputDirectory -File -Filter *.exe)
          if ($setup.Count -ne 1) { throw "Expected exactly one setup executable, found $($setup.Count)" }
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -File |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (!$signTool) { throw 'SignTool is missing from the runner' }
          & $signTool.FullName sign /fd SHA256 /sha1 $env:CERTIFICATE_THUMBPRINT /s My $setup[0].FullName
          if ($LASTEXITCODE -ne 0) { throw "Setup signing failed with exit code $LASTEXITCODE" }
          $setupSignature = Get-AuthenticodeSignature -LiteralPath $setup[0].FullName
          if (!$setupSignature.SignerCertificate -or $setupSignature.SignerCertificate.Thumbprint -ne $env:CERTIFICATE_THUMBPRINT) {
            throw "Setup signer does not match the configured Lee's Mail certificate"
          }

          $logPath = Join-Path $env:RUNNER_TEMP 'lees-mail-setup.log'
          $process = Start-Process -FilePath $setup[0].FullName -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/LOG=$logPath" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            if (Test-Path -LiteralPath $logPath) { Get-Content -LiteralPath $logPath -Tail 80 }
            throw "Lee's Mail setup verification failed with exit code $($process.ExitCode)"
          }
          $installed = @(Get-AppxPackage -Name LeesMail | Where-Object { $_.Version -eq $env:PACKAGE_VERSION })
          if ($installed.Count -ne 1) { throw "Lee's Mail setup did not install package version $env:PACKAGE_VERSION" }
          $installed | Remove-AppxPackage
          if (Get-AppxPackage -Name LeesMail) { throw "Lee's Mail setup verification package cleanup failed" }

      - name: Stage and verify release files
        id: package
        working-directory: source
        shell: pwsh
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          SOURCE_TAG: ${{ steps.tags.outputs.source_tag }}
          PUBLIC_TAG: ${{ steps.tags.outputs.public_tag }}
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          $package = @(Get-ChildItem -LiteralPath artifacts/msix -Recurse -File -Filter *.msix)
          if ($package.Count -ne 1) { throw "Expected exactly one MSIX, found $($package.Count)" }
          $signature = Get-AuthenticodeSignature -LiteralPath $package[0].FullName
          if (!$signature.SignerCertificate -or $signature.SignerCertificate.Thumbprint -ne $env:CERTIFICATE_THUMBPRINT) {
            throw "MSIX signer does not match the configured Lee's Mail certificate"
          }

          $stage = 'release-stage'
          New-Item -ItemType Directory -Force $stage | Out-Null
          $msixName = "LeesMail_${env:VERSION}_x64.msix"
          $packageName = "LeesMail_${env:VERSION}_x64-setup.exe"
          $certificateName = 'LeesMail_CN-Lee.cer'
          $sourceName = "lees-mail_${env:VERSION}_source.zip"
          $installer = @(Get-ChildItem -LiteralPath artifacts/installer -File -Filter *.exe)
          if ($installer.Count -ne 1) { throw "Expected exactly one setup executable, found $($installer.Count)" }
          Copy-Item -LiteralPath $installer[0].FullName -Destination "$stage/$packageName" -Force
          Copy-Item -LiteralPath $package[0].FullName -Destination "$stage/$msixName" -Force
          Export-Certificate -Cert "Cert:\CurrentUser\My\$env:CERTIFICATE_THUMBPRINT" -FilePath "$stage/$certificateName" -Force | Out-Null
          git archive --format=zip --output "$stage/$sourceName" $env:SOURCE_TAG
          if ($LASTEXITCODE -ne 0) { throw 'Source archive creation failed' }

          $publishedPackage = Get-Item -LiteralPath "$stage/$packageName"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $publishedPackage.FullName).Hash
          $base = "https://github.com/${{ github.repository }}/releases/download/$env:PUBLIC_TAG"
          $manifest = [ordered]@{
            version = $env:VERSION
            platform = 'windows-x86_64'
            package = $packageName
            url = "$base/$packageName"
            sha256 = $hash
            size = $publishedPackage.Length
            certificateThumbprint = $env:CERTIFICATE_THUMBPRINT
            msixPackage = $msixName
            sourceArchive = $sourceName
          }
          [IO.File]::WriteAllText(
            "$stage/latest-lees-mail.json",
            ($manifest | ConvertTo-Json -Depth 3) + [Environment]::NewLine,
            [Text.UTF8Encoding]::new($false)
          )
          $notes = @"
          # Lee's Mail $env:VERSION

          Lee's Mail Windows x64 正式版。

          - 修复了一些问题。
          - 运行已签名的安装程序即可安装证书和 MSIX 软件包。

          - SHA-256: ``$hash``
          - 签名证书: ``$env:CERTIFICATE_THUMBPRINT``
          - 已附带对应的 GPL-3.0 源码归档。
          "@
          [IO.File]::WriteAllText('artifacts/release-notes.md', $notes, [Text.UTF8Encoding]::new($false))
          "package_name=$packageName" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT

      - name: Publish Lee's Mail Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tags.outputs.public_tag }}
          name: Lee's Mail ${{ steps.tags.outputs.version }}
          draft: false
          prerelease: false
          make_latest: false
          files: source/release-stage/*
          body_path: source/artifacts/release-notes.md

      - name: Clean private build material
        if: always()
        shell: pwsh
        env:
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
          PFX_PATH: ${{ steps.certificate.outputs.pfx_path }}
        run: |
          if ($env:CERTIFICATE_THUMBPRINT -and (Test-Path "Cert:\CurrentUser\My\$env:CERTIFICATE_THUMBPRINT")) {
            Remove-Item -LiteralPath "Cert:\CurrentUser\My\$env:CERTIFICATE_THUMBPRINT" -Force
          }
          if ($env:PFX_PATH -and (Test-Path -LiteralPath $env:PFX_PATH)) {
            Remove-Item -LiteralPath $env:PFX_PATH -Force
          }
          if (Test-Path -LiteralPath source/LeesMail.Private.props) {
            Remove-Item -LiteralPath source/LeesMail.Private.props -Force
          }
          Get-AppxPackage -Name LeesMail | Remove-AppxPackage -ErrorAction SilentlyContinue
          if ($env:CERTIFICATE_THUMBPRINT -and (Test-Path "Cert:\LocalMachine\TrustedPeople\$env:CERTIFICATE_THUMBPRINT")) {
            Remove-Item -LiteralPath "Cert:\LocalMachine\TrustedPeople\$env:CERTIFICATE_THUMBPRINT" -Force
          }

  cos-lees-mail-mirror:
    needs: build-lees-mail
    if: ${{ needs.build-lees-mail.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Lee's Mail Release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ needs.build-lees-mail.outputs.public_tag }}
        run: |
          set -euo pipefail
          mkdir assets
          gh release download "$PUBLIC_TAG" --repo "$GITHUB_REPOSITORY" --dir assets
          test -s assets/latest-lees-mail.json

      - name: Mirror Lee's Mail release to COS
        env:
          VERSION: ${{ needs.build-lees-mail.outputs.version }}
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install --user cos-python-sdk-v5
          python3 - <<'PY'
          import hashlib, json, os, sys, urllib.request
          from pathlib import Path
          from urllib.parse import urlparse
          from qcloud_cos import CosConfig, CosS3Client

          base = os.environ["COS_PUBLIC_BASE_URL"].strip().rstrip("/")
          if "://" not in base:
              base = f"https://{base}"
          parsed = urlparse(base)
          if parsed.scheme != "https" or not parsed.netloc:
              sys.exit(f"COS_PUBLIC_BASE_URL is invalid: {base}")
          prefix = parsed.path.strip("/")
          key = lambda name: f"{prefix}/{name}" if prefix else name
          client = CosS3Client(CosConfig(
              Region=os.environ["TENCENT_COS_REGION"].strip(),
              SecretId=os.environ["TENCENT_COS_SECRET_ID"].strip(),
              SecretKey=os.environ["TENCENT_COS_SECRET_KEY"].strip(),
              Scheme="https",
          ))
          bucket = os.environ["TENCENT_COS_BUCKET"].strip()
          manifest_path = Path("assets/latest-lees-mail.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          package = Path(urlparse(manifest["url"]).path).name
          package_path = Path("assets") / package
          msix_package = manifest["msixPackage"]
          msix_path = Path("assets") / msix_package
          if not package_path.is_file():
              sys.exit(f"Missing Lee's Mail package: {package_path}")
          if not msix_path.is_file():
              sys.exit(f"Missing Lee's Mail MSIX: {msix_path}")
          actual_hash = hashlib.sha256(package_path.read_bytes()).hexdigest().upper()
          if actual_hash != manifest["sha256"].upper() or package_path.stat().st_size != manifest["size"]:
              sys.exit("Lee's Mail package hash or size mismatch")
          client.upload_file(Bucket=bucket, LocalFilePath=str(package_path), Key=key(package), EnableMD5=False)
          client.upload_file(Bucket=bucket, LocalFilePath=str(msix_path), Key=key(msix_package), EnableMD5=False)
          manifest["url"] = f"{base}/{package}"
          body = (json.dumps(manifest, ensure_ascii=False, indent=2) + "\n").encode("utf-8")
          client.put_object(Bucket=bucket, Body=body, Key=key("latest-lees-mail.json"), ContentType="application/json; charset=utf-8")

          current_key = key(package)
          current_msix_key = key(msix_package)
          marker = ""
          while True:
              kwargs = {"Bucket": bucket, "Prefix": key("LeesMail_"), "MaxKeys": 1000}
              if marker:
                  kwargs["Marker"] = marker
              listed = client.list_objects(**kwargs)
              for obj in listed.get("Contents", []) or []:
                  obj_key = obj.get("Key", "")
                  is_old_setup = obj_key.endswith("_x64-setup.exe") and obj_key != current_key
                  is_old_msix = obj_key.endswith("_x64.msix") and obj_key != current_msix_key
                  if is_old_setup or is_old_msix:
                      client.delete_object(Bucket=bucket, Key=obj_key)
                      print(f"Deleted old Lee's Mail mirror: {obj_key}")
              if listed.get("IsTruncated") in ("true", True):
                  marker = listed.get("NextMarker") or ""
                  if marker:
                      continue
              break

          with urllib.request.urlopen(f"{base}/latest-lees-mail.json?verify={os.environ['GITHUB_RUN_ID']}", timeout=30) as response:
              published = json.loads(response.read().decode("utf-8"))
          if published.get("version") != os.environ["VERSION"] or published.get("platform") != "windows-x86_64":
              sys.exit("COS latest-lees-mail.json mismatch")
          if published.get("sha256") != actual_hash or not published.get("certificateThumbprint"):
              sys.exit("COS Lee's Mail integrity fields mismatch")
          print("COS Lee's Mail mirror complete")
          PY

  r2-lees-mail-mirror:
    needs: build-lees-mail
    if: ${{ needs.build-lees-mail.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      R2_BUCKET: packing-list-releases
      R2_PUBLIC_BASE_URL: https://plt-releases.leenbsl.workers.dev
    steps:
      - name: Download Lee's Mail Release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ needs.build-lees-mail.outputs.public_tag }}
        run: |
          set -euo pipefail
          mkdir assets
          gh release download "$PUBLIC_TAG" --repo "$GITHUB_REPOSITORY" --dir assets
          test -s assets/latest-lees-mail.json

      - name: Mirror Lee's Mail release to R2
        env:
          VERSION: ${{ needs.build-lees-mail.outputs.version }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          account_id="$(
            curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              https://api.cloudflare.com/client/v4/accounts |
            python3 -c 'import json, sys; data=json.load(sys.stdin); accounts=data.get("result") or []; assert data.get("success") and accounts; print(accounts[0]["id"])'
          )"
          export CLOUDFLARE_ACCOUNT_ID="$account_id"
          mapfile -t packages < <(python3 - <<'PY'
          import json, os
          from pathlib import Path
          from urllib.parse import urlparse

          base = os.environ["R2_PUBLIC_BASE_URL"].strip().rstrip("/")
          path = Path("assets/latest-lees-mail.json")
          manifest = json.loads(path.read_text(encoding="utf-8"))
          package = Path(urlparse(manifest["url"]).path).name
          manifest["url"] = f"{base}/{package}"
          path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(package)
          print(manifest["msixPackage"])
          PY
          )
          package="${packages[0]}"
          msix_package="${packages[1]}"
          test -s "assets/${package}"
          test -s "assets/${msix_package}"
          npm exec --yes --package wrangler@4 -- wrangler r2 object put "${R2_BUCKET}/${package}" --file "assets/${package}" --remote
          npm exec --yes --package wrangler@4 -- wrangler r2 object put "${R2_BUCKET}/${msix_package}" --file "assets/${msix_package}" --remote
          npm exec --yes --package wrangler@4 -- wrangler r2 object put "${R2_BUCKET}/latest-lees-mail.json" --file assets/latest-lees-mail.json --content-type "application/json; charset=utf-8" --remote
          python3 - "$account_id" "$package" "$msix_package" <<'PY'
          import json, os, sys, urllib.parse, urllib.request

          account_id, current_setup, current_msix = sys.argv[1:4]
          bucket = os.environ["R2_BUCKET"].strip()
          token = os.environ["CLOUDFLARE_API_TOKEN"].strip()
          prefix = "LeesMail_"

          def request(method, path, params=None):
              url = f"https://api.cloudflare.com/client/v4{path}"
              if params:
                  url = f"{url}?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(url, method=method, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=30) as response:
                  data = json.loads(response.read().decode("utf-8"))
              if not data.get("success"):
                  raise SystemExit(json.dumps(data, ensure_ascii=False))
              return data

          bucket_path = f"/accounts/{urllib.parse.quote(account_id, safe='')}/r2/buckets/{urllib.parse.quote(bucket, safe='')}/objects"
          cursor = ""
          stale = []
          while True:
              params = {"prefix": prefix, "per_page": "1000"}
              if cursor:
                  params["cursor"] = cursor
              data = request("GET", bucket_path, params)
              for obj in data.get("result") or []:
                  key = obj.get("key", "")
                  is_old_setup = key.endswith("_x64-setup.exe") and key != current_setup
                  is_old_msix = key.endswith("_x64.msix") and key != current_msix
                  if is_old_setup or is_old_msix:
                      stale.append(key)
              info = data.get("result_info") or {}
              if not info.get("is_truncated"):
                  break
              cursor = info.get("cursor") or ""
              if not cursor:
                  raise SystemExit("R2 listing was truncated without a cursor")
          for key in stale:
              request("DELETE", f"{bucket_path}/{urllib.parse.quote(key, safe='/')}")
              print(f"Deleted old Lee's Mail mirror: {key}")
          PY
          curl -fsS -H "Cache-Control: no-cache" "${R2_PUBLIC_BASE_URL}/latest-lees-mail.json?verify=${GITHUB_RUN_ID}" |
            python3 -c 'import json, os, sys; data=json.load(sys.stdin); assert data.get("version") == os.environ["VERSION"]; assert data.get("platform") == "windows-x86_64"; assert data.get("sha256") and data.get("certificateThumbprint")'
          echo "R2 Lee's Mail mirror complete"
