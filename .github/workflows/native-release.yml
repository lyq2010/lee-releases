name: Lee’s Toolbox Mac Release

on:
  push:
    tags: ["native-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Lee’s Toolbox Mac 源码 tag（如 v3.0.6）"
        required: true
        type: string
      publish:
        description: "创建公开 Release 并镜像到 COS/R2"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-native:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
      SOURCE_REPO: lyq2010/lees-toolbox-mac
    outputs:
      source_tag: ${{ steps.tags.outputs.source_tag }}
      public_tag: ${{ steps.tags.outputs.public_tag }}
      version: ${{ steps.tags.outputs.version }}
    steps:
      - name: Resolve and validate tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            source_tag="${{ inputs.tag }}"
            public_tag="native-${source_tag}"
          else
            public_tag="$GITHUB_REF_NAME"
            source_tag="${public_tag#native-}"
          fi
          [[ "$source_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$public_tag" == "native-${source_tag}" ]]
          echo "source_tag=$source_tag" | tee -a "$GITHUB_OUTPUT"
          echo "public_tag=$public_tag" | tee -a "$GITHUB_OUTPUT"
          echo "version=${source_tag#v}" | tee -a "$GITHUB_OUTPUT"

      - name: Create private source read token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: lees-toolbox-mac
          permission-contents: read

      - name: Checkout native source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ steps.tags.outputs.source_tag }}
          path: source
          token: ${{ steps.source-token.outputs.token }}

      - name: Verify Xcode and macOS SDK
        shell: bash
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version
          swift --version
          sdk_version="$(xcrun --sdk macosx --show-sdk-version)"
          sdk_path="$(xcrun --sdk macosx --show-sdk-path)"
          echo "macOS SDK version: $sdk_version"
          echo "macOS SDK path: $sdk_path"
          test "$(xcodebuild -version | sed -n 's/^Xcode //p')" = "26.6"
          test "$sdk_version" = "26.5"

      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Verify native source version
        working-directory: source
        env:
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          actual="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' packaging/Info.plist)"
          test "$actual" = "$VERSION"

      - name: Test native app
        working-directory: source
        run: swift test

      - name: Package native app and DMG
        working-directory: source
        env:
          RELEASE_TAG: ${{ steps.tags.outputs.source_tag }}
          MES_BASE_URL: ${{ secrets.MES_BASE_URL }}
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          LAUNCHER_PRODUCTION_URL: ${{ secrets.LAUNCHER_PRODUCTION_URL }}
          LAUNCHER_OA_URL: ${{ secrets.LAUNCHER_OA_URL }}
          LAUNCHER_ACADEMY_URL: ${{ secrets.LAUNCHER_ACADEMY_URL }}
          LAUNCHER_EMAIL_URL: ${{ secrets.LAUNCHER_EMAIL_URL }}
        run: ./scripts/package-macos.sh

      - name: Sign native DMG for automatic updates
        working-directory: source
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          dmg="dist/Lee’s Toolbox Mac_${VERSION}_macOS_arm64.dmg"
          npm exec --yes --package @tauri-apps/cli@2.11.2 -- tauri signer sign "$dmg"
          test -s "$dmg.sig"

      - name: Verify package and linked SDK
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          app="dist/Lee‘s工具箱 Mac.app"
          binary="$app/Contents/MacOS/Lee’s Toolbox Mac"
          resources="$app/Contents/Resources"
          test -x "$binary"
          test ! -e "$resources/packing-worker-aarch64-apple-darwin"
          test -s "$resources/zcool-kuaile-subset.ttf"
          test -s "$resources/AppIcon.icns"
          test -s "$resources/AppIconLight.png"
          test -s "$resources/AppIconDark.png"
          test -s "$resources/Assets.car"
          test -s "$resources/ZIPFoundation_ZIPFoundation.bundle/PrivacyInfo.xcprivacy"
          test -s "$resources/mes-base-url.txt"
          test -s "$resources/launcher-urls.json"
          grep -q '/latest-native.json' "$resources/native-update-manifest-urls.txt"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$app"
          /usr/bin/vtool -show-build "$binary" | tee "$RUNNER_TEMP/lc-build-version.txt"
          grep -Eq 'platform[[:space:]]+MACOS' "$RUNNER_TEMP/lc-build-version.txt"
          grep -Eq 'minos[[:space:]]+14\.0' "$RUNNER_TEMP/lc-build-version.txt"
          grep -Eq 'sdk[[:space:]]+26\.5' "$RUNNER_TEMP/lc-build-version.txt"

      - name: Stage public native release
        working-directory: source
        env:
          PUBLIC_TAG: ${{ steps.tags.outputs.public_tag }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-stage
          dmg="dist/Lee’s Toolbox Mac_${VERSION}_macOS_arm64.dmg"
          cp "$dmg" release-stage/
          cp "$dmg.sig" release-stage/
          python3 - <<'PY'
          import base64
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ["VERSION"]
          tag = os.environ["PUBLIC_TAG"]
          source_name = f"Lee’s Toolbox Mac_{version}_macOS_arm64.dmg"
          asset_name = f"Lee.s.Toolbox.Mac_{version}_macOS_arm64.dmg"
          encoded_signature = Path(f"dist/{source_name}.sig").read_text(encoding="utf-8").strip()
          try:
              signature = base64.b64decode(encoded_signature, validate=True).decode("utf-8").strip()
          except Exception as exc:
              raise SystemExit(f"Native DMG signature is invalid: {exc}") from exc
          if len(signature.splitlines()) != 4 or not signature.startswith("untrusted comment:"):
              raise SystemExit("Native DMG signature is not a minisign signature")
          base = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{tag}"
          data = {
              "version": version,
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "darwin-aarch64-native": {
                      "signature": signature,
                      "url": f"{base}/{asset_name}"
                  }
              }
          }
          Path("release-stage/latest-native.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY

      - name: Extract native release notes
        working-directory: source
        env:
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = re.escape(os.environ["VERSION"])
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{version}\][^\n]*\n\n(?P<body>.*?)(?=^## \[|\Z)",
              changelog,
              flags=re.MULTILINE | re.DOTALL,
          )
          if match is None:
              raise SystemExit(f"CHANGELOG.md 缺少版本 {os.environ['VERSION']} 的发布说明")
          notes = match.group("body").strip()
          if not notes:
              raise SystemExit("原生 macOS 发布说明为空")
          Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
          PY

      - name: Create draft native Release
        if: github.event_name == 'push' || inputs.publish
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tags.outputs.public_tag }}
          name: Lee’s Toolbox Mac ${{ steps.tags.outputs.version }}
          draft: true
          make_latest: false
          files: source/release-stage/*
          body_path: source/release-notes.md

      - name: Verify and publish native Release
        if: github.event_name == 'push' || inputs.publish
        working-directory: source
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ steps.tags.outputs.public_tag }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          mkdir release-verify
          gh release download "$PUBLIC_TAG" --repo "$GITHUB_REPOSITORY" --dir release-verify
          source_dmg="release-stage/Lee’s Toolbox Mac_${VERSION}_macOS_arm64.dmg"
          downloaded_dmg="release-verify/Lee.s.Toolbox.Mac_${VERSION}_macOS_arm64.dmg"
          test -s "$downloaded_dmg"
          test -s "$downloaded_dmg.sig"
          test -s release-verify/latest-native.json
          cmp "$source_dmg" "$downloaded_dmg"
          cmp "$source_dmg.sig" "$downloaded_dmg.sig"
          cmp release-stage/latest-native.json release-verify/latest-native.json
          gh release edit "$PUBLIC_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest=false

  cos-native-mirror:
    needs: build-native
    if: ${{ needs.build-native.result == 'success' && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download native Release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ needs.build-native.outputs.public_tag }}
        run: |
          set -euo pipefail
          mkdir assets
          gh release download "$PUBLIC_TAG" --repo "$GITHUB_REPOSITORY" --dir assets
          test -s assets/latest-native.json

      - name: Mirror native release to COS
        env:
          VERSION: ${{ needs.build-native.outputs.version }}
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install --user cos-python-sdk-v5
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from pathlib import Path
          from urllib.parse import urlparse
          from qcloud_cos import CosConfig, CosS3Client

          base = os.environ["COS_PUBLIC_BASE_URL"].strip().rstrip("/")
          if "://" not in base:
              base = f"https://{base}"
          parsed = urlparse(base)
          if parsed.scheme != "https" or not parsed.netloc:
              sys.exit(f"COS_PUBLIC_BASE_URL is invalid: {base}")
          prefix = parsed.path.strip("/")
          key = lambda name: f"{prefix}/{name}" if prefix else name

          client = CosS3Client(CosConfig(
              Region=os.environ["TENCENT_COS_REGION"].strip(),
              SecretId=os.environ["TENCENT_COS_SECRET_ID"].strip(),
              SecretKey=os.environ["TENCENT_COS_SECRET_KEY"].strip(),
              Scheme="https",
          ))
          bucket = os.environ["TENCENT_COS_BUCKET"].strip()
          manifest = json.loads(Path("assets/latest-native.json").read_text(encoding="utf-8"))
          item = manifest["platforms"]["darwin-aarch64-native"]
          dmg = Path(urlparse(item["url"]).path).name
          dmg_path = Path("assets") / dmg
          if not dmg_path.is_file():
              sys.exit(f"Missing native DMG: {dmg_path}")
          client.upload_file(Bucket=bucket, LocalFilePath=str(dmg_path), Key=key(dmg), EnableMD5=False)
          item["url"] = f"{base}/{dmg}"
          body = (json.dumps(manifest, ensure_ascii=False, indent=2) + "\n").encode("utf-8")
          client.put_object(Bucket=bucket, Body=body, Key=key("latest-native.json"), ContentType="application/json; charset=utf-8")

          current_key = key(dmg)
          for object_prefix, suffix in (
              ("packing-list-toolkit_", "_macos-native-arm64.dmg"),
              ("Lee.s.Toolbox.Mac_", "_macOS_arm64.dmg"),
          ):
              marker = ""
              while True:
                  kwargs = {"Bucket": bucket, "Prefix": key(object_prefix), "MaxKeys": 1000}
                  if marker:
                      kwargs["Marker"] = marker
                  listed = client.list_objects(**kwargs)
                  for obj in listed.get("Contents", []) or []:
                      obj_key = obj.get("Key", "")
                      if obj_key.endswith(suffix) and obj_key != current_key:
                          client.delete_object(Bucket=bucket, Key=obj_key)
                          print(f"Deleted old native mirror: {obj_key}")
                  if listed.get("IsTruncated") in ("true", True):
                      marker = listed.get("NextMarker") or ""
                      if marker:
                          continue
                  break

          with urllib.request.urlopen(f"{base}/latest-native.json?verify={os.environ['GITHUB_RUN_ID']}", timeout=30) as response:
              published = json.loads(response.read().decode("utf-8"))
          if published.get("version") != os.environ["VERSION"]:
              sys.exit("COS latest-native.json version mismatch")
          if not published.get("platforms", {}).get("darwin-aarch64-native", {}).get("signature"):
              sys.exit("COS latest-native.json signature missing")
          print("COS native mirror complete")
          PY

  r2-native-mirror:
    needs: build-native
    if: ${{ needs.build-native.result == 'success' && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download native Release
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ needs.build-native.outputs.public_tag }}
        run: |
          set -euo pipefail
          mkdir assets
          gh release download "$PUBLIC_TAG" --repo "$GITHUB_REPOSITORY" --dir assets
          test -s assets/latest-native.json

      - name: Mirror native release to R2
        env:
          VERSION: ${{ needs.build-native.outputs.version }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          R2_BUCKET: packing-list-releases
          R2_PUBLIC_BASE_URL: https://plt-releases.leenbsl.workers.dev
        run: |
          set -euo pipefail
          account_id="$(
            curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              https://api.cloudflare.com/client/v4/accounts |
            python3 -c 'import json, sys; data=json.load(sys.stdin); accounts=data.get("result") or []; assert data.get("success") and accounts; print(accounts[0]["id"])'
          )"
          export CLOUDFLARE_ACCOUNT_ID="$account_id"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import urlparse

          base = os.environ["R2_PUBLIC_BASE_URL"].strip().rstrip("/")
          manifest_path = Path("assets/latest-native.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          item = manifest["platforms"]["darwin-aarch64-native"]
          dmg = Path(urlparse(item["url"]).path).name
          item["url"] = f"{base}/{dmg}"
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(dmg)
          PY
          dmg="Lee.s.Toolbox.Mac_${VERSION}_macOS_arm64.dmg"
          npm exec --yes --package wrangler@4 -- wrangler r2 object put "${R2_BUCKET}/${dmg}" --file "assets/${dmg}" --remote
          npm exec --yes --package wrangler@4 -- wrangler r2 object put "${R2_BUCKET}/latest-native.json" --file assets/latest-native.json --content-type "application/json; charset=utf-8" --remote
          python3 - "$account_id" <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          account_id = sys.argv[1]
          bucket = os.environ["R2_BUCKET"].strip()
          token = os.environ["CLOUDFLARE_API_TOKEN"].strip()
          current = f"Lee.s.Toolbox.Mac_{os.environ['VERSION']}_macOS_arm64.dmg"
          patterns = (
              ("packing-list-toolkit_", "_macos-native-arm64.dmg"),
              ("Lee.s.Toolbox.Mac_", "_macOS_arm64.dmg"),
          )

          def request(method, path, params=None):
              url = f"https://api.cloudflare.com/client/v4{path}"
              if params:
                  url = f"{url}?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(url, method=method, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=30) as response:
                  data = json.loads(response.read().decode("utf-8"))
              if not data.get("success"):
                  raise SystemExit(json.dumps(data, ensure_ascii=False))
              return data

          bucket_path = (
              f"/accounts/{urllib.parse.quote(account_id, safe='')}"
              f"/r2/buckets/{urllib.parse.quote(bucket, safe='')}/objects"
          )
          stale = []
          for prefix, suffix in patterns:
              cursor = ""
              while True:
                  params = {"prefix": prefix, "per_page": "1000"}
                  if cursor:
                      params["cursor"] = cursor
                  data = request("GET", bucket_path, params)
                  for obj in data.get("result") or []:
                      key = obj.get("key", "")
                      if key.endswith(suffix) and key != current:
                          stale.append(key)
                  info = data.get("result_info") or {}
                  if not info.get("is_truncated"):
                      break
                  cursor = info.get("cursor") or ""
                  if not cursor:
                      raise SystemExit("R2 listing was truncated without a cursor")

          for key in stale:
              request("DELETE", f"{bucket_path}/{urllib.parse.quote(key, safe='/')}")
              print(f"Deleted old native mirror: {key}")
          PY
          curl -fsS -H "Cache-Control: no-cache" "${R2_PUBLIC_BASE_URL}/latest-native.json?verify=${GITHUB_RUN_ID}" |
            python3 -c 'import json, os, sys; data=json.load(sys.stdin); item=data.get("platforms", {}).get("darwin-aarch64-native", {}); assert data.get("version") == os.environ["VERSION"]; assert item.get("signature")'
          echo "R2 native mirror complete"
