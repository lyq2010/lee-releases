name: Release

# tag push 自动触发构建发布；也可手动 dispatch。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "要构建并发布的开发仓库 tag（如 v2.1.4）"
        required: true
        type: string
      mode:
        description: "Release workflow mode"
        required: false
        default: build
        type: choice
        options:
          - build
          - mirror-only

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  SOURCE_REPO: lyq2010/packing-list-desktop
  SKILLS_REPO: lyq2010/jx-skills

permissions:
  contents: write

jobs:
  validate-tag:
    if: ${{ inputs.mode != 'mirror-only' }}
    runs-on: ubuntu-latest
    steps:
      - name: 生成私有源码只读 token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: packing-list-desktop,jx-skills
          permission-contents: read
      - name: 校验发布 tag
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "发布 tag 格式无效：${RELEASE_TAG}（应为 v主版本.次版本.修订号）"
            exit 1
          }
          gh api "repos/${SOURCE_REPO}/git/ref/tags/${RELEASE_TAG}" >/dev/null

  drift-check:
    if: ${{ inputs.mode != 'mirror-only' }}
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: 生成私有源码只读 token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: packing-list-desktop,jx-skills
          permission-contents: read
      - name: 拉取开发仓库
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.RELEASE_TAG }}
          path: source
          token: ${{ steps.source-token.outputs.token }}
      - name: 拉取 jx-skills
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SKILLS_REPO }}
          ref: main
          path: _skill
          token: ${{ steps.source-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: 比对桌面引擎与 skill
        run: python source/tools/engine_sync.py --check --skill-root _skill

  tests:
    if: ${{ inputs.mode != 'mirror-only' }}
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: 生成私有源码只读 token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: packing-list-desktop,jx-skills
          permission-contents: read
      - name: 拉取开发仓库
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.RELEASE_TAG }}
          path: source
          token: ${{ steps.source-token.outputs.token }}
      - name: 拉取 jx-skills
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SKILLS_REPO }}
          ref: main
          path: _skill
          token: ${{ steps.source-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: 安装 Python 依赖
        working-directory: source
        run: python -m pip install -r python/requirements.txt
      - name: skill 领域回归（双版平价 + 冒烟）
        run: |
          cd _skill/packing-list-toolkit-win
          python tests/compare_variants.py
          python tests/smoke_pipeline.py
          python tests/smoke_append_backfill.py
          python tests/smoke_missing_headers.py
      - name: 桌面 worker 真实业务链测试
        working-directory: source
        run: python -m unittest discover -s python/tests

  build-windows:
    if: ${{ inputs.mode != 'mirror-only' }}
    needs: [drift-check, tests]
    runs-on: windows-latest
    steps:
      - name: 生成私有源码只读 token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: packing-list-desktop
          permission-contents: read
      - name: 拉取开发仓库
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.RELEASE_TAG }}
          path: source
          token: ${{ steps.source-token.outputs.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri
      - name: 注入版本号（以 tag 为准）
        working-directory: source
        run: python tools/set_version.py "${{ env.RELEASE_TAG }}"
      - name: 安装 Python 依赖
        working-directory: source
        run: python -m pip install -r python/requirements.txt
      - name: 从 Secret 生成 MES 地址配置
        shell: pwsh
        env:
          MES_BASE_URL: ${{ secrets.MES_BASE_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MES_BASE_URL)) {
            throw "仓库 Actions Secret MES_BASE_URL 未配置，停止构建不可用发布包"
          }
          $root = Join-Path $env:GITHUB_WORKSPACE "source"
          $path = Join-Path $root "python/engine/_mes_config.py"
          $encoded = $env:MES_BASE_URL.Trim() | ConvertTo-Json -Compress
          [IO.File]::WriteAllText($path, "BASE_URL = $encoded`n", [Text.UTF8Encoding]::new($false))
      - name: 构建 Python sidecar
        shell: pwsh
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE "source"
          python -m PyInstaller --noconfirm --clean --onefile --name packing-worker `
            --distpath "$root/python/dist" --workpath "$root/python/build" `
            --add-data "$root/python/engine;engine" `
            --hidden-import glob --hidden-import copy --hidden-import collections `
            --hidden-import zipfile --hidden-import urllib.request --hidden-import urllib.parse `
            "$root/python/worker.py"
          New-Item -ItemType Directory -Force "$root/src-tauri/binaries" | Out-Null
          Copy-Item "$root/python/dist/packing-worker.exe" "$root/src-tauri/binaries/packing-worker-x86_64-pc-windows-msvc.exe" -Force
      - name: 导入代码签名证书
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
          $pfx = Join-Path $env:RUNNER_TEMP "code-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, $bytes)
          $sec = ConvertTo-SecureString "${{ secrets.WINDOWS_CERT_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $sec | Out-Null
      - name: 安装前端依赖
        working-directory: source
        run: npm ci
      - name: 注入 COS 更新通道
        working-directory: source
        env:
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
        run: python tools/inject_update_channel.py
      - name: Tauri 构建（含签名 NSIS 安装包 + 更新签名）
        working-directory: source
        run: npm run tauri:build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PLT_TELEMETRY_URL: ${{ secrets.PLT_TELEMETRY_URL }}
          VITE_LAUNCHER_PRODUCTION_URL: ${{ secrets.LAUNCHER_PRODUCTION_URL }}
          VITE_LAUNCHER_OA_URL: ${{ secrets.LAUNCHER_OA_URL }}
          VITE_LAUNCHER_ACADEMY_URL: ${{ secrets.LAUNCHER_ACADEMY_URL }}
          VITE_LAUNCHER_EMAIL_URL: ${{ secrets.LAUNCHER_EMAIL_URL }}
      - name: 组装便携版并整理发布产物（ASCII 名）
        shell: pwsh
        run: |
          $ver  = "${{ env.RELEASE_TAG }}" -replace '^v',''
          $root = Join-Path $env:GITHUB_WORKSPACE "source"
          $rel  = "$root/src-tauri/target/release"
          $stage = "$root/dist-release"
          New-Item -ItemType Directory -Force $stage | Out-Null
          $pname = "packing-list-toolkit_${ver}_x64_portable"
          $pdir  = "$root/portable/$pname"
          New-Item -ItemType Directory -Force $pdir | Out-Null
          Copy-Item "$rel/packing-list-desktop.exe" "$pdir/建筑板打包单工具箱.exe" -Force
          Copy-Item "$rel/packing-worker.exe" "$pdir/packing-worker.exe" -Force
          Copy-Item "$root/packaging/local-code-signing.cer" "$pdir/local-code-signing.cer" -Force
          Copy-Item "$root/packaging/信任证书（双击运行一次）.bat" $pdir -Force
          Copy-Item "$root/packaging/portable-README.txt" "$pdir/README.txt" -Force
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object Thumbprint -eq '92F183EB22EB3F0115CEC468C9AAE3930615E7A6'
          Set-AuthenticodeSignature -FilePath "$pdir/建筑板打包单工具箱.exe" -Certificate $cert -TimestampServer "http://timestamp.digicert.com" -HashAlgorithm SHA256 | Out-Null
          Set-AuthenticodeSignature -FilePath "$pdir/packing-worker.exe" -Certificate $cert -TimestampServer "http://timestamp.digicert.com" -HashAlgorithm SHA256 | Out-Null
          Set-Content -Path "$pdir/portable.flag" -Value $ver -Encoding ascii
          Compress-Archive -Path "$pdir/*" -DestinationPath "$stage/$pname.zip" -Force
          $psha = (Get-FileHash "$stage/$pname.zip" -Algorithm SHA256).Hash.ToLower()
          $setup = Get-ChildItem "$rel/bundle/nsis/*-setup.exe" | Select-Object -First 1
          Copy-Item $setup.FullName "$stage/packing-list-toolkit_${ver}_x64-setup.exe" -Force
          $sig = (Get-Content (Get-ChildItem "$rel/bundle/nsis/*-setup.exe.sig" | Select-Object -First 1).FullName -Raw).Trim()
          $latest = [ordered]@{
            version  = $ver
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{ "windows-x86_64" = [ordered]@{
              signature = $sig
              url = "https://github.com/${{ github.repository }}/releases/download/v${ver}/packing-list-toolkit_${ver}_x64-setup.exe"
            } }
            portable = [ordered]@{
              url = "https://github.com/${{ github.repository }}/releases/download/v${ver}/$pname.zip"
              sha256 = $psha
            }
          } | ConvertTo-Json -Depth 6
          [IO.File]::WriteAllText("$stage/latest.json", $latest, (New-Object System.Text.UTF8Encoding($false)))
      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: source/dist-release/*

  build-macos:
    if: ${{ inputs.mode != 'mirror-only' }}
    needs: [drift-check, tests]
    runs-on: macos-14
    steps:
      - name: 生成私有源码只读 token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: packing-list-desktop
          permission-contents: read
      - name: 拉取开发仓库
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.RELEASE_TAG }}
          path: source
          token: ${{ steps.source-token.outputs.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri
      - name: 注入版本号（以 tag 为准）
        working-directory: source
        run: python3 tools/set_version.py "${{ env.RELEASE_TAG }}"
      - name: 安装 Python 依赖
        working-directory: source
        run: python3 -m pip install --break-system-packages -r python/requirements.txt
      - name: 从 Secret 生成 MES 地址配置
        working-directory: source
        env:
          MES_BASE_URL: ${{ secrets.MES_BASE_URL }}
        run: |
          if [ -z "${MES_BASE_URL//[[:space:]]/}" ]; then
            echo "仓库 Actions Secret MES_BASE_URL 未配置，停止构建不可用发布包" >&2
            exit 1
          fi
          python3 -c 'import os, pathlib; url = os.environ["MES_BASE_URL"].strip(); pathlib.Path("python/engine/_mes_config.py").write_text(f"BASE_URL = {url!r}\n", encoding="utf-8")'
      - name: 构建 Python sidecar (arm64)
        working-directory: source
        run: bash python/build_worker.sh
      - name: 安装前端依赖
        working-directory: source
        run: npm ci
      - name: 注入 COS 更新通道
        working-directory: source
        env:
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
        run: python3 tools/inject_update_channel.py
      - name: Tauri 构建（arm64 dmg + 自动更新包，未做 Apple 公证）
        working-directory: source
        run: npm run tauri:build -- --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PLT_TELEMETRY_URL: ${{ secrets.PLT_TELEMETRY_URL }}
          VITE_LAUNCHER_PRODUCTION_URL: ${{ secrets.LAUNCHER_PRODUCTION_URL }}
          VITE_LAUNCHER_OA_URL: ${{ secrets.LAUNCHER_OA_URL }}
          VITE_LAUNCHER_ACADEMY_URL: ${{ secrets.LAUNCHER_ACADEMY_URL }}
          VITE_LAUNCHER_EMAIL_URL: ${{ secrets.LAUNCHER_EMAIL_URL }}
      - name: 整理发布产物（ASCII 名）
        working-directory: source
        run: |
          set -euo pipefail
          ver="${RELEASE_TAG#v}"
          mkdir -p dist-release
          dmg=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" "dist-release/packing-list-toolkit_${ver}_arm64.dmg"
          tgz=$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz | head -1)
          cp "$tgz" "dist-release/packing-list-toolkit_${ver}_aarch64.app.tar.gz"
          cp "$tgz.sig" "dist-release/packing-list-toolkit_${ver}_aarch64.app.tar.gz.sig"
      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: source/dist-release/*

  release:
    if: ${{ inputs.mode != 'mirror-only' }}
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: 生成私有源码只读 token
        id: source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SOURCE_APP_ID }}
          private-key: ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          owner: lyq2010
          repositories: packing-list-desktop
          permission-contents: read
      - name: 拉取开发仓库
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.RELEASE_TAG }}
          path: source
          token: ${{ steps.source-token.outputs.token }}
      - name: 从 CHANGELOG 提取当前版本说明
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path
          version = os.environ["RELEASE_TAG"].lstrip("v")
          text = Path("source/CHANGELOG.md").read_text(encoding="utf-8")
          heading = re.search(rf"(?m)^##\s+{re.escape(version)}(?:\s+-[^\n]*)?$", text)
          if not heading:
              raise SystemExit(f"CHANGELOG.md 缺少版本章节: {version}")
          following = text[heading.end():]
          next_heading = re.search(r"(?m)^##\s+", following)
          end = heading.end() + (next_heading.start() if next_heading else len(following))
          notes = text[heading.start():end].strip() + "\n"
          Path("release-notes.md").write_text(notes, encoding="utf-8")
          print(notes)
          PY
      - name: 下载所有产物
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: 补全 latest.json 的 macOS 更新条目
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"; ver="${tag#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          sig_file="artifacts/macos/packing-list-toolkit_${ver}_aarch64.app.tar.gz.sig"
          tar_url="${base}/packing-list-toolkit_${ver}_aarch64.app.tar.gz"
          python3 - "$sig_file" "$tar_url" <<'PY'
          import json, sys
          from pathlib import Path
          sig = Path(sys.argv[1]).read_text(encoding="utf-8").strip()
          if not sig:
              raise SystemExit("macOS 更新签名为空")
          manifest = Path("artifacts/windows/latest.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          data["platforms"]["darwin-aarch64"] = {"signature": sig, "url": sys.argv[2]}
          manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY
      - name: 发布前校验本地产物
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"; ver="${tag#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          python3 - "$ver" "$base" <<'PY'
          import hashlib, json, sys
          from pathlib import Path
          ver, base = sys.argv[1:]
          manifest_path = Path("artifacts/windows/latest.json")
          data = json.loads(manifest_path.read_text(encoding="utf-8"))
          if data.get("version") != ver:
              raise SystemExit(f"latest.json 版本不一致: {data.get('version')} != {ver}")
          expected = {
              "windows-x86_64": f"{base}/packing-list-toolkit_{ver}_x64-setup.exe",
              "darwin-aarch64": f"{base}/packing-list-toolkit_{ver}_aarch64.app.tar.gz",
          }
          for platform, url in expected.items():
              item = data.get("platforms", {}).get(platform, {})
              if item.get("url") != url or not item.get("signature"):
                  raise SystemExit(f"{platform} 更新条目无效")
          portable = Path(f"artifacts/windows/packing-list-toolkit_{ver}_x64_portable.zip")
          portable_meta = data.get("portable", {})
          if portable_meta.get("url") != f"{base}/{portable.name}":
              raise SystemExit("便携包 URL 不一致")
          if hashlib.sha256(portable.read_bytes()).hexdigest().lower() != str(portable_meta.get("sha256", "")).lower():
              raise SystemExit("便携包 SHA256 不一致")
          required = [
              Path(f"artifacts/windows/packing-list-toolkit_{ver}_x64-setup.exe"),
              Path(f"artifacts/macos/packing-list-toolkit_{ver}_arm64.dmg"),
              Path(f"artifacts/macos/packing-list-toolkit_{ver}_aarch64.app.tar.gz"),
              Path(f"artifacts/macos/packing-list-toolkit_{ver}_aarch64.app.tar.gz.sig"),
          ]
          missing = [str(path) for path in required if not path.is_file() or path.stat().st_size == 0]
          if missing:
              raise SystemExit("缺少发布产物: " + ", ".join(missing))
          PY
      - name: 创建草稿 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            artifacts/windows/*
            artifacts/macos/*
          body_path: release-notes.md
      - name: 校验草稿 Release 资产并公开
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          rm -rf release-verify
          mkdir release-verify
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir release-verify
          while IFS= read -r source; do
            target="release-verify/$(basename "$source")"
            [ -f "$target" ] || { echo "缺少草稿资产: $target"; exit 1; }
            cmp "$source" "$target" || { echo "草稿资产内容不一致: $target"; exit 1; }
          done < <(find artifacts -type f -print)
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --latest

  cos-mirror:
    needs: release
    if: ${{ always() && (inputs.mode == 'mirror-only' || needs.release.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: 下载 GitHub Release 产物
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          rm -rf cos-assets
          mkdir -p cos-assets
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir cos-assets
          test -s cos-assets/latest.json
          ls -la cos-assets
      - name: 上传产物到腾讯 COS（并生成指向 COS 的 latest.json）
        env:
          COS_PUBLIC_BASE_URL: ${{ secrets.COS_PUBLIC_BASE_URL }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install --user cos-python-sdk-v5
          python3 - <<'PY'
          import json, os, sys, urllib.request
          from pathlib import Path
          from urllib.parse import urlparse
          from qcloud_cos import CosConfig, CosS3Client

          tag = os.environ["RELEASE_TAG"]
          newver = tag[1:] if tag.startswith("v") else tag
          base = os.environ["COS_PUBLIC_BASE_URL"].strip().rstrip("/")
          if "://" not in base:
              base = f"https://{base}"
          bucket = os.environ["TENCENT_COS_BUCKET"].strip()
          region = os.environ["TENCENT_COS_REGION"].strip()
          secret_id = os.environ["TENCENT_COS_SECRET_ID"].strip()
          secret_key = os.environ["TENCENT_COS_SECRET_KEY"].strip()
          if not all([base, bucket, region, secret_id, secret_key]):
              sys.exit("COS secrets are incomplete")
          parsed = urlparse(base)
          if parsed.scheme not in {"http", "https"} or not parsed.netloc:
              sys.exit(f"COS_PUBLIC_BASE_URL is invalid: {base}")
          prefix = parsed.path.strip("/")
          def key(name: str) -> str:
              return f"{prefix}/{name}" if prefix else name
          def public_url(name: str) -> str:
              return f"{base}/{name}"

          client = CosS3Client(CosConfig(Region=region, SecretId=secret_id, SecretKey=secret_key, Scheme="https"))
          oldver = ""
          try:
              with urllib.request.urlopen(f"{base}/latest.json", timeout=20) as resp:
                  oldver = json.loads(resp.read().decode("utf-8")).get("version", "")
          except Exception as exc:
              print(f"No previous COS latest.json detected: {exc}")
          print(f"COS old version: {oldver or '(none)'}; new version: {newver}")

          assets = [p for p in sorted(Path("cos-assets").iterdir()) if p.is_file()]
          for path in assets:
              if path.name == "latest.json":
                  continue
              client.upload_file(Bucket=bucket, LocalFilePath=str(path), Key=key(path.name), EnableMD5=False)
              print(f"  uploaded {key(path.name)}")

          data = json.loads(Path("cos-assets/latest.json").read_text(encoding="utf-8"))
          for item in data.get("platforms", {}).values():
              if item.get("url"):
                  item["url"] = public_url(Path(urlparse(item["url"]).path).name)
          if data.get("portable", {}).get("url"):
              data["portable"]["url"] = public_url(Path(urlparse(data["portable"]["url"]).path).name)
          body = json.dumps(data, ensure_ascii=False, indent=2).encode("utf-8")
          client.put_object(Bucket=bucket, Body=body, Key=key("latest.json"), ContentType="application/json; charset=utf-8")
          print(json.dumps(data, ensure_ascii=False, indent=2))

          keep_keys = {key(path.name) for path in assets if path.name != "latest.json"}
          release_prefix = key("packing-list-toolkit_")
          marker = ""
          while True:
              list_kwargs = {"Bucket": bucket, "Prefix": release_prefix, "MaxKeys": 1000}
              if marker:
                  list_kwargs["Marker"] = marker
              listed = client.list_objects(**list_kwargs)
              for obj in listed.get("Contents", []) or []:
                  obj_key = obj.get("Key", "")
                  if obj_key and obj_key not in keep_keys:
                      client.delete_object(Bucket=bucket, Key=obj_key)
                      print(f"  deleted old {obj_key}")
              if listed.get("IsTruncated") in ("true", True):
                  marker = listed.get("NextMarker") or ""
                  if marker:
                      continue
              break
          print("COS mirror complete")
          PY

  r2-mirror:
    needs: release
    if: ${{ always() && (inputs.mode == 'mirror-only' || needs.release.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: 下载 GitHub Release 产物
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          rm -rf r2-assets
          mkdir -p r2-assets
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir r2-assets
          test -s r2-assets/latest.json
          ls -la r2-assets
      - name: 上传产物到 Cloudflare R2（并生成指向 R2 的 latest.json）
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: packing-list-releases
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install --user boto3
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          from urllib.parse import urlparse

          import boto3

          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"].strip()
          bucket = os.environ["R2_BUCKET"].strip()
          base = os.environ["R2_PUBLIC_BASE_URL"].strip().rstrip("/")
          access_key = os.environ["R2_ACCESS_KEY_ID"].strip()
          secret_key = os.environ["R2_SECRET_ACCESS_KEY"].strip()
          if not all([account_id, bucket, base, access_key, secret_key]):
              sys.exit("R2 secrets are incomplete")
          if "://" not in base:
              base = f"https://{base}"
          parsed = urlparse(base)
          if parsed.scheme not in {"http", "https"} or not parsed.netloc:
              sys.exit(f"R2_PUBLIC_BASE_URL is invalid: {base}")

          client = boto3.client(
              "s3",
              endpoint_url=f"https://{account_id}.r2.cloudflarestorage.com",
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              region_name="auto",
          )

          data = json.loads(Path("r2-assets/latest.json").read_text(encoding="utf-8"))
          def public_url(url):
              return f"{base}/{Path(urlparse(url).path).name}"
          for plat in data.get("platforms", {}).values():
              if plat.get("url"):
                  plat["url"] = public_url(plat["url"])
          if data.get("portable", {}).get("url"):
              data["portable"]["url"] = public_url(data["portable"]["url"])
          Path("r2-assets/latest.json").write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(data, ensure_ascii=False, indent=2))

          assets = [p for p in sorted(Path("r2-assets").iterdir()) if p.is_file()]
          for path in assets:
              if path.name == "latest.json":
                  continue
              client.upload_file(
                  Filename=str(path),
                  Bucket=bucket,
                  Key=path.name,
                  ExtraArgs={
                      "ContentType": "application/octet-stream",
                      "CacheControl": "public, max-age=31536000, immutable",
                  },
              )
              print(f"  uploaded {bucket}/{path.name}")

          client.put_object(
              Bucket=bucket,
              Key="latest.json",
              Body=Path("r2-assets/latest.json").read_bytes(),
              ContentType="application/json; charset=utf-8",
              CacheControl="public, max-age=60",
          )
          print(f"  uploaded {bucket}/latest.json")

          keep_keys = {path.name for path in assets if path.name != "latest.json"}
          paginator = client.get_paginator("list_objects_v2")
          for page in paginator.paginate(Bucket=bucket, Prefix="packing-list-toolkit_"):
              for obj in page.get("Contents", []) or []:
                  key = obj.get("Key", "")
                  if key and key not in keep_keys:
                      client.delete_object(Bucket=bucket, Key=key)
                      print(f"  deleted old {key}")
          print("R2 mirror complete")
          PY
